<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Obsidian Quick Note</title>
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <div class="popup">
    <div class="target-path" id="target-path" data-i18n="saveToPrefix">保存到：</div>
    <div class="target-edit" id="target-edit">
      <label><span data-i18n="folderLabel">文件夹</span> <input type="text" id="target-folder-input" data-i18n-placeholder="folderPlaceholder" placeholder="覆盖文件夹" /></label>
      <label><span data-i18n="filenameLabel">文件名</span> <input type="text" id="target-filename-input" data-i18n-placeholder="filenamePlaceholder" placeholder="覆盖文件名" /></label>
      <div class="target-edit-actions">
        <button id="target-edit-save" type="button" data-i18n="save">保存</button>
        <button id="target-edit-cancel" type="button" data-i18n="cancel">取消</button>
      </div>
    </div>
    <div class="toggles">
      <label><input type="checkbox" id="toggle-url" /> <span data-i18n="urlToggle">URL</span></label>
      <label><input type="checkbox" id="toggle-title" /> <span data-i18n="titleToggle">标题</span></label>
    </div>
    <div class="frontmatter-section" id="frontmatter-section">
      <div class="frontmatter-header" id="frontmatter-header">
        <span data-i18n="frontmatterLegend">Frontmatter</span>
        <span class="frontmatter-summary" id="frontmatter-summary">...</span>
      </div>
      <div class="frontmatter-body" id="frontmatter-body">
        <label><input type="checkbox" id="fm-title" /> title <span class="fm-value" id="fm-title-value"></span></label>
        <label><input type="checkbox" id="fm-date" /> date <span class="fm-value" id="fm-date-value"></span></label>
        <label><input type="checkbox" id="fm-url" /> url <span class="fm-value" id="fm-url-value"></span></label>
        <label><input type="checkbox" id="fm-author" /> author <span class="fm-value" id="fm-author-value"></span></label>
        <label><input type="checkbox" id="fm-description" /> description <span class="fm-value" id="fm-description-value"></span></label>
        <label><input type="checkbox" id="fm-site" /> site <span class="fm-value" id="fm-site-value"></span></label>
        <label><input type="checkbox" id="fm-tags" /> tags <span class="fm-value" id="fm-tags-value"></span></label>
      </div>
    </div>
    <textarea id="editor" data-i18n-placeholder="enterMarkdown" placeholder="输入 Markdown…"></textarea>
    <div class="footer">
      <span id="char-count"></span>
      <button id="save-btn" data-i18n="saveToObsidian">保存到 Obsidian</button>
      <a href="../options/options.html" target="_blank" id="open-options" data-i18n="settings">设置</a>
    </div>
    <div id="status"></div>
  </div>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
